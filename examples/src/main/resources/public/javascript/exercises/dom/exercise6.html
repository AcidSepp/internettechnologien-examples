<html lang="en">
    <head>
        <title>Execution Order</title>
        <script type="text/javascript">
            document.addEventListener("DOMContentLoaded", function () {
                let a = document.querySelector(".target")
                document.getElementById("foo").appendChild(a.firstChild)
            });
        </script>
    </head>
    <body id="foo">
        <div class="target">Test 1</div>
        <div class="target">Test 2</div>
        <div class="target">Test 3</div>
        <div class="target">Test 4</div>
    </body>
</html>
