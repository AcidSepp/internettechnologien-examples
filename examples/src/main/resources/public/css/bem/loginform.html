<!DOCTYPE html>
<meta charset="UTF-8">
<html lang="DE">
    <head>
        <link rel="stylesheet" type="text/css" href="loginform.css"/>
        <title>Login</title>
        <script src="loginform.js" type="text/javascript"></script>
    </head>
    <body>
        <main>
            <form class="myForm">
                <div class="myForm__username myForm__username--invalid" id="usernameElement">
                    <label for="inputUsername">Username:</label>
                    <input id="inputUsername" type="text">
                </div>
                <div class="myForm__password">
                    <label for="inputPassword">Password:</label>
                    <input type="password" id="inputPassword" >
                </div>
                <div class="myForm_rememberMe" id="rememberMe" >
                    <label for="rememberMe">Remember Me:</label>
                    <input type="checkbox">
                </div>
            </form>
        </main>
    </body>
</html>
